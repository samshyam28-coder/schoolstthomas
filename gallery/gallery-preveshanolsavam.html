    <style>
        /* --- CSS STYLES --- */
       :root {
    --navy: #05162a;
    --gold: #bf953f;
    --glass: rgba(255, 255, 255, 0.1);
    --glass-border: rgba(255, 255, 255, 0.2);
    --navy-light: #09223f;
}

/* CUSTOM SCROLLBAR */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background-color: var(--navy);
    color: white;
    overflow-x: hidden;
}

/* 1. TITLE SECTION (FIXED FOR OVERFLOW) */
.gallery-header {
    padding: 120px 10% 60px; /* Increased top padding for fixed nav */
    text-align: center;
    background: linear-gradient(to bottom, var(--navy-light), var(--navy));
}

.back-link {
    text-decoration: none;
    color: var(--gold);
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 25px;
    transition: 0.3s ease;
}

.back-link:hover { transform: translateX(-5px); color: white; }

.gallery-header h1 {
    /* CLAMP: Min 1.8rem, scales with screen, Max 4rem */
    font-size: clamp(1.8rem, 8vw, 4rem); 
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1.1;
    overflow-wrap: break-word; /* The fix you added */
    hyphens: auto; /* Helps break long words on mobile */
    max-width: 100%;
}

.gallery-header p {
    color: #cbd5e1;
    max-width: 700px;
    margin: 20px auto 0;
    line-height: 1.6;
    font-size: 1rem;
}

/* 2. INSTAGRAM GRID SECTION */
.insta-container {
    padding: 20px 10% 100px;
}

.insta-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

.photo-item {
    position: relative;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    cursor: pointer;
    border-radius: 8px; /* Slightly smoother rounded corners */
    background: var(--navy-light); /* Prevents white flash on load */
}

.photo-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
}

.glass-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(5, 22, 42, 0.6);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: 0.4s;
    color: white;
    font-size: 1.5rem;
}

.photo-item:hover .glass-overlay { opacity: 1; }
.photo-item:hover img { transform: scale(1.1); }

/* 3. PRO LIGHTBOX (Z-INDEX UPGRADED) */
.lightbox {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(5, 22, 42, 0.98); /* Darker for better focus */
    backdrop-filter: blur(15px);
    z-index: 99999; /* Higher than your header */
    display: none;
    justify-content: center;
    align-items: center;
    touch-action: none;
}

.lightbox.active { display: flex; animation: fadeIn 0.3s ease; }

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.lb-content {
    position: relative;
    max-width: 90%;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.lb-img-wrapper {
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    border: 1px solid var(--glass-border);
}

.lb-img-wrapper img {
    max-width: 100%;
    max-height: 70vh; /* Reduced slightly for tools room */
    display: block;
    object-fit: contain;
}

.lb-close { 
    position: absolute; 
    top: -60px; 
    right: 0; 
    font-size: 2.5rem; 
    cursor: pointer; 
    color: white; 
    transition: 0.3s;
}

.lb-close:hover { color: var(--gold); transform: rotate(90deg); }
 
.lb-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 2rem;
    color: white;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
    width: 60px; height: 60px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    transition: 0.3s;
}

.lb-prev { left: -100px; }
.lb-next { right: -100px; }
.lb-nav:hover { background: var(--gold); color: var(--navy); }

.lb-tools {
    margin-top: 25px;
    display: flex;
    gap: 30px;
    background: var(--glass);
    padding: 12px 30px;
    border-radius: 40px;
    border: 1px solid var(--glass-border);
}

.tool-btn { cursor: pointer; font-size: 1.3rem; color: var(--gold); transition: 0.3s; }
.tool-btn:hover { color: white; transform: scale(1.2); }

/* MOBILE RESPONSIVE */
@media (max-width: 1024px) {
    .lb-prev { left: -70px; }
    .lb-next { right: -70px; }
}

@media (max-width: 768px) {
    .insta-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .gallery-header { padding-top: 100px; }
    
    .lb-nav { 
        width: 50px; height: 50px; 
        font-size: 1.2rem; 
        background: rgba(0,0,0,0.5); 
        top: auto;
        bottom: -80px; /* Move arrows below image on mobile */
    }
    
    .lb-prev { left: 20%; }
    .lb-next { right: 20%; }
    
    .lb-tools { margin-top: 100px; } /* Room for mobile nav */
    
    .lb-close { top: -50px; right: 10px; }
}
    </style>
</head>
<body>

    <section class="gallery-header">
        <a href="../gallery.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Gallery Hub</a>
        <h1>Praveshanolsavam</h1>
        <p>A festive start to a lifelong journey of learning. We welcome our little ones into the St. Thomas family with open hearts, music, and colorful festivities, ensuring their first step into school is filled with joy and wonder.</p>

            </div>

                <img src="preveshanolsavam/2.jpeg" alt="Praveshanolsavam Moment 2">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(2)">
                <img src="preveshanolsavam/3.jpeg" alt="Praveshanolsavam Moment 3">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(3)">
                <img src="preveshanolsavam/4.jpeg" alt="Praveshanolsavam Moment 4">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(4)">
                <img src="preveshanolsavam/5.jpeg" alt="Praveshanolsavam Moment 5">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(5)">
                <img src="preveshanolsavam/6.jpeg" alt="Praveshanolsavam Moment 6">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(6)">
                <img src="preveshanolsavam/7.jpeg" alt="Praveshanolsavam Moment 7">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(7)">
                <img src="preveshanolsavam/8.jpeg" alt="Praveshanolsavam Moment 8">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(8)">
                <img src="preveshanolsavam/9.jpeg" alt="Praveshanolsavam Moment 9">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(6)">
                <img src="preveshanolsavam/10.jpeg" alt="Praveshanolsavam Moment 10">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(7)">
                <img src="preveshanolsavam/11.jpeg" alt="Praveshanolsavam Moment 11">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(8)">
                <img src="preveshanolsavam/12.jpeg" alt="Praveshanolsavam Moment 12">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
        </div>
    </section>

    <div class="lightbox" id="lightbox">
        <div class="lb-content">
            <span class="lb-close" onclick="closeLightbox()">&times;</span>
            <div class="lb-nav lb-prev" onclick="changeImg(-1)"><i class="fas fa-chevron-left"></i></div>
            <div class="lb-img-wrapper">
                <img id="lbMainImage" src="" alt="Full View">
            </div>
            <div class="lb-nav lb-next" onclick="changeImg(1)"><i class="fas fa-chevron-right"></i></div>
            <div class="lb-tools">
                <div class="tool-btn" onclick="zoomImg(1.2)"><i class="fas fa-magnifying-glass-plus"></i></div>
                <div class="tool-btn" onclick="zoomImg(1)"><i class="fas fa-compress"></i></div>
                <div class="tool-btn" onclick="zoomImg(0.8)"><i class="fas fa-magnifying-glass-minus"></i></div>
            </div>
        </div>
    </div>

    <script>
        let currentImgIdx = 0;
        let zoomLevel = 1;
        let touchStartX = 0;
        let touchEndX = 0;
        
        const images = document.querySelectorAll('.photo-item img');
        const lightbox = document.getElementById('lightbox');
        const mainImg = document.getElementById('lbMainImage');

        function openLightbox(index) {
            currentImgIdx = index;
            zoomLevel = 1;
            updateLightbox();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function updateLightbox() {
            mainImg.src = images[currentImgIdx].src;
            mainImg.style.transform = `scale(1)`;
        }

        function changeImg(step) {
            currentImgIdx += step;
            if (currentImgIdx >= images.length) currentImgIdx = 0;
            if (currentImgIdx < 0) currentImgIdx = images.length - 1;
            zoomLevel = 1;
            updateLightbox();
        }

        function zoomImg(level) {
            if(level === 1) zoomLevel = 1;
            else zoomLevel *= level;
            if(zoomLevel > 3) zoomLevel = 3;
            if(zoomLevel < 0.5) zoomLevel = 0.5;
            mainImg.style.transform = `scale(${zoomLevel})`;
        }

        lightbox.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        lightbox.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            if(zoomLevel === 1) {
                if (touchStartX - touchEndX > 70) changeImg(1);
                if (touchEndX - touchStartX > 70) changeImg(-1);
            }
        }

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === "Escape") closeLightbox();
            if (e.key === "ArrowRight") changeImg(1);
            if (e.key === "ArrowLeft") changeImg(-1);
        });
    </script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
