<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="apple-touch-icon" sizes="180x180" href="../images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon-16x16.png">
    <link rel="manifest" href="../images/site.webmanifest">
    <link rel="shortcut icon" href="../images/favicon.ico">
    <meta name="theme-color" content="#09223f">

    <title>Annual Sports Day Gallery | St. Thomas HSS Poonthura</title>
    <meta name="title" content="Annual Sports Day Gallery | St. Thomas HSS Poonthura">
    <meta name="description" content="Relive the excitement of the Annual Sports Day at St. Thomas HSS Poonthura. Photos of track events, march past, and house competitions.">
    <meta name="keywords" content="School sports day Poonthura, track and field school, St. Thomas HSS athletics, sports gallery Kerala, school events">
    <meta name="author" content="St. Thomas HSS Poonthura">
    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stthomshsspoonthura.com/gallery/sports.html">
    <meta property="og:title" content="Sports Day Gallery - St. Thomas HSS">
    <meta property="og:description" content="Athleticism and team spirit on display at our annual sports meet.">
    <meta property="og:image" content="https://stthomshsspoonthura.com/images/android-chrome-512x512.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>
    :root {
        --navy: #05162a;
        --gold: #bf953f;
        --glass: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
    }

    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background-color: var(--navy);
        color: white;
        overflow-x: hidden;
    }

    /* 1. HEADER */
    .gallery-header {
        padding: 100px 10% 40px;
        text-align: center;
        background: linear-gradient(to bottom, #09223f, var(--navy));
    }

    .back-link {
        text-decoration: none;
        color: var(--gold);
        font-weight: 600;
        display: inline-flex;
        align-items: center; gap: 8px;
        margin-bottom: 20px;
        transition: 0.3s;
    }

    .back-link:hover { transform: translateX(-5px); color: white; }

    .gallery-header h1 {
        font-size: clamp(2.5rem, 5vw, 4rem);
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .gallery-header p {
        color: #cbd5e1;
        max-width: 700px;
        margin: 15px auto 0;
        line-height: 1.6;
    }

    /* 2. GRID */
    .insta-container { padding: 40px 10% 100px; }

    .insta-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
    }

    .photo-item {
        position: relative;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        cursor: pointer;
        border-radius: 8px;
        border: 1px solid var(--glass-border);
    }

    .photo-item img {
        width: 100%; height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .glass-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        display: flex; justify-content: center; align-items: center;
        opacity: 0; transition: 0.4s; color: white; font-size: 1.5rem;
    }

    .photo-item:hover .glass-overlay { opacity: 1; }
    .photo-item:hover img { transform: scale(1.1); }

    /* 3. LIGHTBOX */
    .lightbox {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(5, 22, 42, 0.98);
        backdrop-filter: blur(15px);
        z-index: 9999;
        display: none;
        justify-content: center; align-items: center;
    }

    .lightbox.active { display: flex; }

    .lb-content {
        position: relative;
        max-width: 90%;
        display: flex; flex-direction: column; align-items: center;
    }

    .lb-img-wrapper {
        overflow: hidden;
        border-radius: 12px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .lb-img-wrapper img {
        max-width: 100%; max-height: 70vh;
        display: block; transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .lb-close { position: absolute; top: -60px; right: 0; font-size: 2.5rem; cursor: pointer; z-index: 10001; }

    .lb-nav {
        position: absolute;
        top: 50%; transform: translateY(-50%);
        font-size: 2rem; color: var(--gold);
        cursor: pointer; background: rgba(5, 22, 42, 0.8);
        width: 60px; height: 60px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 50%; transition: 0.3s; z-index: 10000;
    }
    .lb-prev { left: -100px; }
    .lb-next { right: -100px; }
    .lb-nav:hover { background: var(--gold); color: var(--navy); }

    .lb-tools {
        margin-top: 25px;
        display: flex; gap: 25px;
        background: var(--glass); padding: 12px 30px;
        border-radius: 40px; border: 1px solid var(--glass-border);
    }

    .tool-btn { cursor: pointer; font-size: 1.2rem; color: var(--gold); transition: 0.3s; }
    .tool-btn:hover { color: white; transform: scale(1.2); }

    @media (max-width: 768px) {
        .insta-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .lb-prev { left: 10px; }
        .lb-next { right: 10px; }
        .lb-nav { width: 45px; height: 45px; font-size: 1.2rem; }
    }
</style>
</head>

<body>

    <section class="gallery-header">
        <a href="../gallery.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Gallery Hub</a>
        <h1 data-aos="fade-down">Annual Sports Day</h1>
        <p data-aos="fade-up">A day of grit, determination, and triumph. Experience the energy of our Annual Sports Day, from the rhythmic march past to the breathtaking photo-finishes on the track.</p>
    </section>

    <section class="insta-container">
        <div class="insta-grid">
            <div class="photo-item" onclick="openLightbox(0)" data-aos="zoom-in">
                <img src="sportsday/1.jpeg" alt="Opening Ceremony March Past">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>

            <div class="photo-item" onclick="openLightbox(1)" data-aos="zoom-in" data-aos-delay="100">
                <img src="sportsday/2.jpeg" alt="100m Sprint Finish">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>

            <div class="photo-item" onclick="openLightbox(2)" data-aos="zoom-in" data-aos-delay="200">
                <img src="sportsday/3.jpeg" alt="Relay Race Excitement">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>

            <div class="photo-item" onclick="openLightbox(3)" data-aos="zoom-in" data-aos-delay="300">
                <img src="sportsday/4.jpeg" alt="Long Jump Competition">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>

            <div class="photo-item" onclick="openLightbox(4)" data-aos="zoom-in" data-aos-delay="400">
                <img src="sportsday/5.jpeg" alt="Tug of War Challenge">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>

            <div class="photo-item" onclick="openLightbox(5)" data-aos="zoom-in" data-aos-delay="500">
                <img src="sportsday/6.jpeg" alt="Medal Distribution Ceremony">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
        </div>
    </section>

    <div class="lightbox" id="lightbox">
        <div class="lb-content">
            <span class="lb-close" onclick="closeLightbox()">&times;</span>
            <div class="lb-nav lb-prev" onclick="changeImg(-1)"><i class="fas fa-chevron-left"></i></div>
            <div class="lb-img-wrapper">
                <img id="lbMainImage" src="" alt="Full View">
            </div>
            <div class="lb-nav lb-next" onclick="changeImg(1)"><i class="fas fa-chevron-right"></i></div>
            <div class="lb-tools">
                <div class="tool-btn" onclick="zoomImg(1.2)"><i class="fas fa-magnifying-glass-plus"></i></div>
                <div class="tool-btn" onclick="zoomImg(1)"><i class="fas fa-compress"></i></div>
                <div class="tool-btn" onclick="zoomImg(0.8)"><i class="fas fa-magnifying-glass-minus"></i></div>
            </div>
        </div>
    </div>

<script>
    let currentImgIdx = 0;
    let zoomLevel = 1;
    const images = document.querySelectorAll('.photo-item img');
    const lightbox = document.getElementById('lightbox');
    const mainImg = document.getElementById('lbMainImage');
    let touchstartX = 0;
    let touchendX = 0;

    function openLightbox(index) {
        currentImgIdx = index;
        zoomLevel = 1;
        updateLightbox();
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    function updateLightbox() {
        mainImg.style.opacity = '0';
        setTimeout(() => {
            mainImg.src = images[currentImgIdx].src;
            mainImg.style.transform = `scale(1)`;
            mainImg.style.opacity = '1';
        }, 150);
    }

    function changeImg(step) {
        currentImgIdx = (currentImgIdx + step + images.length) % images.length;
        zoomLevel = 1;
        updateLightbox();
    }

    function zoomImg(level) {
        zoomLevel = (level === 1) ? 1 : zoomLevel * level;
        zoomLevel = Math.min(Math.max(zoomLevel, 0.5), 3);
        mainImg.style.transform = `scale(${zoomLevel})`;
    }

    // Swiping for Mobile
    lightbox.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX);
    lightbox.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        if (touchstartX - touchendX > 70) changeImg(1);
        if (touchendX - touchstartX > 70) changeImg(-1);
    });

    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowRight") changeImg(1);
        if (e.key === "ArrowLeft") changeImg(-1);
    });
</script>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
