<style>
    :root {
        --navy: #05162a;
        --gold: #bf953f;
        --glass: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
    }

    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background-color: var(--navy);
        color: white;
        overflow-x: hidden;
    }

    /* 1. TITLE SECTION */
    .gallery-header {
        padding: 100px 10% 40px;
        text-align: center;
        background: linear-gradient(to bottom, #09223f, var(--navy));
    }

    .back-link {
        text-decoration: none;
        color: var(--gold);
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 20px;
        transition: 0.3s;
    }

    .back-link:hover { transform: translateX(-5px); color: white; }

    .gallery-header h1 {
        font-size: clamp(2.5rem, 5vw, 4rem);
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .gallery-header p {
        color: #cbd5e1;
        max-width: 700px;
        margin: 15px auto 0;
        line-height: 1.6;
    }

    /* 2. GALLERY GRID */
    .insta-container {
        padding: 40px 10% 100px;
    }

    .insta-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
    }

    .photo-item {
        position: relative;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        cursor: pointer;
        border-radius: 8px;
        border: 1px solid var(--glass-border);
    }

    .photo-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .glass-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: 0.4s;
        color: white;
        font-size: 1.5rem;
    }

    .photo-item:hover .glass-overlay { opacity: 1; }
    .photo-item:hover img { transform: scale(1.1); }

    /* 3. LIGHTBOX */
    .lightbox {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(5, 22, 42, 0.98);
        backdrop-filter: blur(15px);
        z-index: 9999;
        display: none;
        justify-content: center;
        align-items: center;
    }

    .lightbox.active { display: flex; }

    .lb-content {
        position: relative;
        max-width: 90%;
        max-height: 85vh;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .lb-img-wrapper {
        overflow: hidden;
        border-radius: 12px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .lb-img-wrapper img {
        max-width: 100%;
        max-height: 70vh;
        display: block;
        transition: transform 0.3s ease;
    }

    .lb-close { position: absolute; top: -50px; right: 0; font-size: 2.5rem; cursor: pointer; color: white; transition: 0.3s; }
    .lb-close:hover { color: var(--gold); }

    .lb-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 2rem;
        color: var(--gold);
        cursor: pointer;
        background: rgba(255,255,255,0.05);
        width: 60px; height: 60px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 50%;
        transition: 0.3s;
        border: 1px solid var(--glass-border);
    }
    .lb-prev { left: -100px; }
    .lb-next { right: -100px; }
    .lb-nav:hover { background: var(--gold); color: var(--navy); }

    .lb-tools {
        margin-top: 25px;
        display: flex;
        gap: 25px;
        background: var(--glass);
        padding: 12px 30px;
        border-radius: 40px;
        border: 1px solid var(--glass-border);
    }

    .tool-btn { cursor: pointer; font-size: 1.2rem; color: var(--gold); transition: 0.3s; }
    .tool-btn:hover { color: white; transform: scale(1.2); }

    @media (max-width: 1024px) {
        .lb-prev { left: -70px; }
        .lb-next { right: -70px; }
    }

    @media (max-width: 768px) {
        .insta-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .lb-prev { left: 10px; }
        .lb-next { right: 10px; }
        .lb-nav { width: 45px; height: 45px; font-size: 1.2rem; background: rgba(5, 22, 42, 0.8); }
        .lb-content { max-width: 95%; }
    }
</style>
</head>

<body>

    <section class="gallery-header">
        <a href="../gallery.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Gallery Hub</a>
        <h1 data-aos="fade-down">Kalotsavam</h1>
        <p data-aos="fade-up">A grand celebration of art and culture. Witness the spectacular performances and creative expressions of our students during the annual school Kalotsavam.</p>
    </section>

    <section class="insta-container">
        <div class="insta-grid">
            <div class="photo-item" onclick="openLightbox(0)" data-aos="fade-up">
                <img src="kalotsavam/1.jpeg" alt="Kalotsavam Dance Performance">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(1)" data-aos="fade-up" data-aos-delay="50">
                <img src="kalotsavam/2.jpeg" alt="Kalotsavam Music Event">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(2)" data-aos="fade-up" data-aos-delay="100">
                <img src="kalotsavam/3.jpeg" alt="Traditional Performance">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(3)" data-aos="fade-up" data-aos-delay="150">
                <img src="kalotsavam/4.jpeg" alt="School Arts Fest">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(4)" data-aos="fade-up" data-aos-delay="200">

            </div>

                <img src="kalotsavam/6.jpeg" alt="Kalotsavam Stage Program">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(6)" data-aos="fade-up">
                <img src="kalotsavam/7.jpeg" alt="Student Talent Show">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(7)" data-aos="fade-up" data-aos-delay="50">
                <img src="kalotsavam/8.jpeg" alt="Kalotsavam Highlights">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(8)" data-aos="fade-up" data-aos-delay="100">
                <img src="kalotsavam/9.jpeg" alt="Cultural Fest Kerala">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>

                <img src="kalotsavam/10.jpeg" alt="Music and Arts">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(10)" data-aos="fade-up" data-aos-delay="200">
                <img src="kalotsavam/11.jpeg" alt="Stage Decor Kalotsavam">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
            <div class="photo-item" onclick="openLightbox(11)" data-aos="fade-up" data-aos-delay="250">
                <img src="kalotsavam/12.jpeg" alt="Poonthura School Fest">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
             <div class="photo-item" onclick="openLightbox(12)" data-aos="fade-up" data-aos-delay="250">
                <img src="kalotsavam/13.jpeg" alt="Poonthura School Fest">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
             <div class="photo-item" onclick="openLightbox(13)" data-aos="fade-up" data-aos-delay="250">
                <img src="kalotsavam/14.jpeg" alt="Poonthura School Fest">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
             <div class="photo-item" onclick="openLightbox(14)" data-aos="fade-up" data-aos-delay="250">
                <img src="kalotsavam/15.jpeg" alt="Poonthura School Fest">
                <div class="glass-overlay"><i class="fas fa-expand"></i></div>
            </div>
        </div>
    </section>

    <div class="lightbox" id="lightbox">
        <div class="lb-content">
            <span class="lb-close" onclick="closeLightbox()">&times;</span>
            <div class="lb-nav lb-prev" onclick="changeImg(-1)"><i class="fas fa-chevron-left"></i></div>
            <div class="lb-img-wrapper">
                <img id="lbMainImage" src="" alt="Full View">
            </div>
            <div class="lb-nav lb-next" onclick="changeImg(1)"><i class="fas fa-chevron-right"></i></div>
            <div class="lb-tools">
                <div class="tool-btn" onclick="zoomImg(1.2)"><i class="fas fa-magnifying-glass-plus"></i></div>
                <div class="tool-btn" onclick="zoomImg(1)"><i class="fas fa-compress"></i></div>
                <div class="tool-btn" onclick="zoomImg(0.8)"><i class="fas fa-magnifying-glass-minus"></i></div>
            </div>
        </div>
    </div>

<script>
        let currentImgIdx = 0;
        let zoomLevel = 1;
        const images = document.querySelectorAll('.photo-item img');
        const lightbox = document.getElementById('lightbox');
        const mainImg = document.getElementById('lbMainImage');

        function openLightbox(index) {
            currentImgIdx = index;
            zoomLevel = 1;
            updateLightbox();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function updateLightbox() {
            mainImg.style.opacity = '0';
            setTimeout(() => {
                mainImg.src = images[currentImgIdx].src;
                mainImg.style.transform = `scale(1)`;
                mainImg.style.opacity = '1';
            }, 150);
        }

        function changeImg(step) {
            currentImgIdx += step;
            if (currentImgIdx >= images.length) currentImgIdx = 0;
            if (currentImgIdx < 0) currentImgIdx = images.length - 1;
            zoomLevel = 1;
            updateLightbox();
        }

        function zoomImg(level) {
            if(level === 1) zoomLevel = 1;
            else zoomLevel *= level;
            if(zoomLevel > 3) zoomLevel = 3;
            if(zoomLevel < 0.5) zoomLevel = 0.5;
            mainImg.style.transform = `scale(${zoomLevel})`;
        }

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === "Escape") closeLightbox();
            if (e.key === "ArrowRight") changeImg(1);
            if (e.key === "ArrowLeft") changeImg(-1);
        });
</script>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 1000,
        once: true,
        offset: 100
    });
</script>
