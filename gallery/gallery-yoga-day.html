    <style>
        :root {
            --navy: #05162a;
            --gold: #bf953f;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--navy);
            color: white;
            overflow-x: hidden;
        }

        /* 1. TITLE SECTION */
        .gallery-header {
            padding: 100px 10% 40px;
            text-align: center;
            background: linear-gradient(to bottom, #09223f, var(--navy));
        }

        .back-link {
            text-decoration: none;
            color: var(--gold);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .back-link:hover { transform: translateX(-5px); color: white; }

        .gallery-header h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .gallery-header p {
            color: #cbd5e1;
            max-width: 700px;
            margin: 15px auto 0;
            line-height: 1.6;
        }

        /* 2. GRID SECTION */
        .insta-container {
            padding: 40px 10% 100px;
        }

        .insta-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .photo-item {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            cursor: pointer;
            border-radius: 4px;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .glass-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 0.4s;
            color: white;
            font-size: 1.5rem;
        }

        .photo-item:hover .glass-overlay { opacity: 1; }
        .photo-item:hover img { transform: scale(1.1); }

        /* 3. LIGHTBOX */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 22, 42, 0.95);
            backdrop-filter: blur(15px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        .lightbox.active { display: flex; }

        .lb-content {
            position: relative;
            max-width: 90%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lb-img-wrapper {
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .lb-img-wrapper img {
            max-width: 100%;
            max-height: 75vh;
            display: block;
            transition: transform 0.3s ease;
        }

        .lb-close { position: absolute; top: -50px; right: 0; font-size: 2rem; cursor: pointer; color: white; }
        
        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.5rem;
            color: var(--gold);
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            transition: 0.3s;
        }
        
        .lb-prev { left: -80px; }
        .lb-next { right: -80px; }
        .lb-nav:hover { background: var(--gold); color: var(--navy); }

        .lb-tools {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            background: var(--glass);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
        }

        .tool-btn { cursor: pointer; font-size: 1.2rem; color: var(--gold); transition: 0.3s; }
        .tool-btn:hover { color: white; transform: scale(1.2); }

        @media (max-width: 768px) {
            .insta-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .lb-prev { left: 10px; }
            .lb-next { right: 10px; }
            .lb-nav { width: 45px; height: 45px; font-size: 1.5rem; background: rgba(0,0,0,0.5); }
        }
    </style>
</head>
<body>
